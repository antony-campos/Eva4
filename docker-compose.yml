services:

  db:
    image: mariadb:11
    container_name: mariadb

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bd_ventas

    ports:
      - "3306:3306"

    volumes:
      - mariadb_data:/var/lib/mysql

  backend:
    build: ./backend

    container_name: backend

    ports:
      - "8080:80"

    volumes:
      - ./backend:/var/www/html

    depends_on:
      - db

  frontend:
    build: ./frontend

    container_name: frontend

    ports:
      - "3000:3000"

    volumes:
      - ./frontend:/app

    stdin_open: true
    tty: true

    depends_on:
      - backend

volumes:
  mariadb_data: